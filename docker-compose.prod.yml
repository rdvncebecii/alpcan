# AlpCAN — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# NOT: Caddy yerine sunucudaki mevcut nginx kullanılıyor (127.0.0.1 bind)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8010:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml:/app/ml
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:3010:3000"
    env_file: .env
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alpcan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alpcan_secret}
      POSTGRES_DB: ${POSTGRES_DB:-alpcan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpcan"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A app.core.queue worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml:/app/ml
    restart: unless-stopped

  orthanc:
    build: ./orthanc
    ports:
      - "127.0.0.1:8052:8042"
      - "4242:4242"
    volumes:
      - orthanc_data:/var/lib/orthanc/db
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  orthanc_data:
